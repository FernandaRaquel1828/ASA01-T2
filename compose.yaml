services:
  web01:
    build:
      context: .
      dockerfile: Dockerfile
    image: web01
    container_name: web01
    ports:
      - '80:8080'
    networks:
      - asa-network
    volumes:
      - ./data:/usr/share/nginx/html
      - ./conf/default.conf:/etc/nginx/conf.d/default.conf
#Docker Networks
networks:
  asa-network:
    driver: bridge
    